# postgresql.conf içine include edin. archive-wal.sh postgres kullanıcısı
# tarafından çalıştırılabilir, WAL_ARCHIVE_ROOT ise yazılabilir olmalıdır.
wal_level = replica
archive_mode = on
archive_timeout = 60s
archive_command = 'WAL_ARCHIVE_ROOT=/var/lib/clinicnova/wal /opt/clinicnova/ops/postgres/archive-wal.sh "%p" "%f"'
max_wal_senders = 5
wal_keep_size = 1024MB
